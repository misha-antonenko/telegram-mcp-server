services:
  telegram-mcp-server:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./server.log:/app/server.log
      - fastmcp_home:/root/.local/share/fastmcp
      - attachments:/app/.attachments
    networks:
      - caddy-net

volumes:
  fastmcp_home:
  attachments:

networks:
  caddy-net:
    external: true
