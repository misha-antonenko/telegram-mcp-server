services:
  telegram-mcp-server:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./server.log:/app/server.log

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    env_file: .env
    restart: unless-stopped
    depends_on:
      - telegram-mcp-server

volumes:
  caddy_data:
